<script>

// ✅ IMPORTANT: PUT YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "PASTE_REAL_KEY",
  authDomain: "PASTE_REAL",
  databaseURL: "PASTE_REAL",
  projectId: "PASTE_REAL",
  storageBucket: "PASTE_REAL",
  messagingSenderId: "PASTE_REAL",
  appId: "PASTE_REAL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentWork = null;
let current = 0;

function show(p){
['home','library','reader','adminWorks','editor']
.forEach(id=>document.getElementById(id).classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
}

function addWork(){
let name = document.getElementById("newWorkName").value;
if(!name) return;

db.ref('works/'+name).set(true);
loadWorks();
}

function loadWorks(){
db.ref('works').on('value',snap=>{
let list = document.getElementById("worksList");
list.innerHTML='';

snap.forEach(w=>{
let name=w.key;

let div=document.createElement('div');
div.className='card';

div.innerHTML=`
<b>${name}</b><br>
<button onclick="openWork('${name}')">Open</button>
`;

list.appendChild(div);
});
});
}

function openWork(w){
currentWork = w;
openEditor();
}

function openEditor(){
db.ref('chapters/'+currentWork).once('value').then(snap=>{
let num = snap.numChildren()+1;

document.getElementById("editorTitle").innerText =
`Writing Chapter ${num}`;

show('editor');
});
}

function publishChapter(){
let t = document.getElementById("newTitle").value;
let c = document.getElementById("editorBox").innerHTML;

if(!t || !c) return;

db.ref('chapters/'+currentWork).once('value').then(snap=>{
let num = snap.numChildren()+1;

db.ref('chapters/'+currentWork+'/'+num).set({
title:`Chapter ${num}: ${t}`,
content:c
});

loadLibrary();
alert('Published');
show('library');
});
}

function loadLibrary(){
db.ref('chapters').on('value',snap=>{
let lib = document.getElementById("libraryList");
lib.innerHTML='';

snap.forEach(work=>{
work.forEach(chap=>{
let c=chap.val();

let div=document.createElement('div');
div.className='card';

div.innerHTML=`
<b>${c.title}</b><br>
<small>${work.key}</small>
`;

div.onclick=()=>openChapter(work.key,chap.key);

lib.appendChild(div);
});
});
});
}

function openChapter(w,i){
currentWork=w;
current=i;

db.ref(`chapters/${w}/${i}`).once('value').then(snap=>{
let chap=snap.val();

document.getElementById("title").innerText=chap.title;
document.getElementById("content").innerHTML=chap.content;

show('reader');
loadComments();
});
}

function addComment(){
let name = document.getElementById('name').value || 'Anonymous';
let text = document.getElementById('commentBox').value;

if(!text) return;

db.ref(`comments/${currentWork}/${current}`).push({name,text});

document.getElementById('commentBox').value='';
loadComments();
}

function loadComments(){
db.ref(`comments/${currentWork}/${current}`).on('value',snap=>{
let box = document.getElementById("comments");
box.innerHTML='';

snap.forEach(c=>{
let d=document.createElement('div');
d.className='comment';

d.innerText = c.val().name + ': ' + c.val().text;

box.appendChild(d);
});
});
}

function adminCheck(){
let key = localStorage.getItem('adminKey');

if(!key){
let k = prompt('Set admin key');
if(k) localStorage.setItem('adminKey',k);
}
else{
let k = prompt('Enter admin key');
if(k === key){
document.getElementById("adminBtn").classList.remove('hidden');
}
}
}

// 🚀 START
adminCheck();
loadWorks();
loadLibrary();

</script>
